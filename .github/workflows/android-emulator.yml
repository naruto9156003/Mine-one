name: Android Emulator + Ngrok + RustDesk + noVNC (A)

on:
  workflow_dispatch:
    inputs:
      quick_test:      { description: "5 min test", type: boolean, default: false }
      runtime_minutes: { description: "Runtime minutes", required: false, default: "355" }
      api_level:       { description: "Android API Level", required: false, default: "34" }
      device:          { description: "Device profile", required: false, default: "pixel_7" }

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: bash

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 370
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq unzip xvfb fluxbox x11vnc novnc websockify

      - name: Setup Ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install -y ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}

      - name: Setup Emulator (reactivecircus)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api_level }}
          target: google_apis
          arch: x86_64
          profile: ${{ inputs.device }}
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          script: echo "Emulator setup done"

      - name: Start VNC + noVNC + Ngrok
        run: |
          # Add Android SDK to PATH
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH

          adb wait-for-device --timeout=120
          echo "✅ Emulator is ready"

          # Start VNC services
          sudo Xvfb :99 -screen 0 1080x1920x24 &
          export DISPLAY=:99
          fluxbox &
          sleep 3

          x11vnc -display :99 -forever -shared -rfbport 5900 -bg &
          sleep 5

          websockify --web=/usr/share/novnc/ 6080 localhost:5900 &
          sleep 8

          # Ngrok
          ngrok http 6080 --log=stdout > ngrok.log 2>&1 &
          sleep 10

          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[] | select(.proto=="https") | .public_url' || echo "Not ready yet")
          echo "NGROK_URL=$NGROK_URL" >> $GITHUB_ENV
          echo "🌐 Ngrok URL: $NGROK_URL"

      - name: RustDesk & Screenshot
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/platform-tools:$PATH

          wget -q https://github.com/rustdesk/rustdesk/releases/download/1.3.1/rustdesk-1.3.1-x86_64.deb -O rustdesk.deb
          sudo apt install -y ./rustdesk.deb
          rustdesk --service &

          adb exec-out screencap -p > screen.png
          curl -F "file=@screen.png" https://store1.gofile.io/uploadFile | jq -r '.data.downloadPage' > url.txt
          echo "SCREENSHOT_URL=$(cat url.txt)" >> $GITHUB_ENV

      - name: Keep Alive
        run: |
          RUNTIME=${{ inputs.runtime_minutes }}
          [[ "${{ inputs.quick_test }}" == "true" ]] && RUNTIME=5
          [ $RUNTIME -gt 360 ] && RUNTIME=355
          end=$((SECONDS + RUNTIME*60))
          while [ $SECONDS -lt $end ]; do
            echo "✅ Android Running | Ngrok: $NGROK_URL"
            sleep 60
          done
