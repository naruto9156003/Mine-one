name: Android Emulator (Remote Access)
on:
  workflow_dispatch:

jobs:
  android-vm:
    runs-on: macos-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install system image + create AVD
        run: |
          sdkmanager "platform-tools" "emulator"
          sdkmanager "system-images;android-33;google_apis;arm64-v8a"
          echo "no" | avdmanager create avd -n phone -k "system-images;android-33;google_apis;arm64-v8a" --device "pixel_6"

      - name: Boot emulator
        run: |
          $ANDROID_HOME/emulator/emulator -avd phone -no-audio -no-window -gpu swiftshader_indirect &
          adb wait-for-device
          adb shell input keyevent 82

      - name: Wait for full boot
        run: |
          echo "Waiting for emulator to fully boot..."
          adb shell 'while [[ -z $(getprop sys.boot_completed | tr -d "\r") ]]; do sleep 2; done'
          echo "Boot completed."

      - name: Spoof device model as Poco C3
        run: |
          adb root
          adb shell setprop ro.product.model "POCO C3"
          adb shell setprop ro.product.manufacturer "POCO"
          adb shell setprop ro.product.brand "POCO"

      - name: Install ngrok tunnel (ADB port expose)
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          brew install ngrok
          ngrok config add-authtoken $NGROK_AUTHTOKEN
          ngrok tcp 5555 --log=stdout &
          sleep 5
          curl -s http://localhost:4040/api/tunnels

      - name: Keep session alive
        run: |
          echo "Emulator running. Check ngrok tunnel URL above to connect via adb connect <host>:<port>"
          sleep 20000
