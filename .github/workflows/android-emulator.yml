name: Android + Tailscale + scrcpy (Recommended)

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:
        description: "Runtime minutes"
        required: false
        default: "240"

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Setup Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TS_AUTHKEY }} --hostname "android-emu" --accept-routes=true
          echo "TAILSCALE_IP=$(tailscale ip -4)" >> $GITHUB_ENV

      - name: Install Android SDK + Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect
          script: echo "Emulator ready"

      - name: Setup scrcpy + Keep Alive
        run: |
          sudo apt-get update && sudo apt-get install -y scrcpy adb
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/platform-tools:$PATH

          adb wait-for-device
          while [ "$(adb shell getprop sys.boot_completed 2>/dev/null)" != "1" ]; do sleep 10; done

          echo "✅ Emulator booted. Use scrcpy from your device over Tailscale"
          echo "Tailscale IP: $TAILSCALE_IP"

          # Keep workflow alive
          sleep ${{ inputs.runtime_minutes }}m
